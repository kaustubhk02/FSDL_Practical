<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Toggle Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Price Toggle</h1>
    <div id="toggle">
        <button id="but1" onclick="monthtoggle()">Monthly</button>
        <button id="but2" onclick="yeartoggle()">Yearly</button>
    </div>
    <div class="cards">
        <h2 class="info">Price</h2>
        <h3 id="price" class="info">₹199<sub>/month</sub></h3>
        <ul class="info">
            <li>Video Lectures</li>
            <li>Test Papers</li>
            <li>Study Material</li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
