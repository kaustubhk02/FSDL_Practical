<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1>Skill Proficiency</h1>
    </div>

    <div id="container">
        <input id="skillName" class="box" placeholder="Enter Skill(eg. React)">
        <input id="percentage" class="box" type="number" placeholder="Enter Proficiency(0-100)">
        <button class="box" id="addSkill" onclick="addSkill()">Add Skill</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
