<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <table>
        <tr>
          <input value="0" type="text" placeholder="0" />
        </tr>
        <tr>
          <td><button onclick="evaluate()">1</button></td>
          <td><button onclick="evaluate()">2</button></td>
          <td><button onclick="evaluate()">3</button></td>
          <td><button onclick="evaluate()">+</button></td>
          <td><button onclick="evaluate()">-</button></td>
        </tr>
        <tr>
          <td><button onclick="evaluate()">4</button></td>
          <td><button onclick="evaluate()">5</button></td>
          <td><button onclick="evaluate()">6</button></td>
          <td><button onclick="evaluate()">*</button></td>
          <td><button onclick="evaluate()">/</button></td>
        </tr>
        <tr>
          <td><button onclick="evaluate()">7</button></td>
          <td><button onclick="evaluate()">8</button></td>
          <td><button onclick="evaluate()">9</button></td>
          <td><button onclick="evaluate()">%</button></td>
          <td><button onclick="evaluate()">.</button></td>
        </tr>
        <tr>
          <td><button onclick="evaluate()">AC</button></td>
          <td><button onclick="evaluate()">DEL</button></td>
          <td><button onclick="evaluate()">0</button></td>
          <td><button onclick="evaluate()">=</button></td>
        </tr>
      </table>
    </div>

    <script src="script.js"></script>
  </body>
</html>
